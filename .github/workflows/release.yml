name: Release

on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows

          - os: ubuntu-latest
            platform: linux

          - os: macos-latest
            platform: macos

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup V
        uses: vlang/setup-v@v1.7
        with:
          version: master

      - name: Check V
        run: |
          v version

      - name: Build and package
        run: |
          mkdir -p build package dist

          v -prod -o build/vsnap src

          arch="$(uname -m)"
          case "$arch" in
            x86_64|amd64)
              arch="x86_64"
              ;;
            arm64|aarch64)
              arch="arm64"
              ;;
          esac

          version="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.tag }}"
          fi

          platform="${{ matrix.platform }}"
          asset="vsnap-${version}-${platform}-${arch}.zip"

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/vsnap.exe package/vsnap.exe
          else
            cp build/vsnap package/vsnap
            chmod +x package/vsnap
          fi

          cp README.md package/
          cp LICENSE package/

          if [ "${{ runner.os }}" = "Windows" ]; then
            pwsh -NoLogo -NoProfile -Command "Compress-Archive -Path package/* -DestinationPath dist/$asset -Force"
          else
            cd package
            zip -r "../dist/$asset" .
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsnap-${{ matrix.platform }}
          path: dist/*.zip

  upload:
    name: Upload release assets
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          gh release upload "$TAG" dist/*.zip --clobber
